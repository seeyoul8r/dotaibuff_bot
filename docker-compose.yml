services:
  app:
    build: .
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      # Caddy proxies public GSI traffic to this local-only FastAPI port.
      - "127.0.0.1:8000:8000"
    volumes:
      # Mount project files so git pull + container restart updates the running code.
      - .:/app
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
